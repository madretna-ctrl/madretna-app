<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MadrEtna — Accesso Volontari</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--verde:#2d5a27;--verde-chiaro:#4a8c3f;--lava:#1a1a1a;--sabbia:#f4ede0;--accent:#8bc34a;--rosso:#c0392b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--lava);color:var(--sabbia);min-height:100vh;display:flex;flex-direction:column;}
header{background:#fff;border-bottom:3px solid var(--verde);padding:0 1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;height:72px;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#1e1e1e;border:1px solid #333;border-radius:16px;padding:2.5rem;width:100%;max-width:420px;}
.card-icon{font-size:2.5rem;text-align:center;margin-bottom:.75rem;}
.card-title{font-family:"Playfair Display",serif;font-size:1.6rem;font-weight:900;text-align:center;margin-bottom:.3rem;}
.card-sub{font-size:.85rem;opacity:.5;text-align:center;margin-bottom:2rem;}
label{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.4rem;margin-top:.9rem;}
label:first-of-type{margin-top:0;}
input{width:100%;background:#2a2a2a;border:1px solid #444;border-radius:8px;color:var(--sabbia);font-family:"DM Sans",sans-serif;font-size:.95rem;padding:.75rem 1rem;transition:border-color .2s;}
input:focus{outline:none;border-color:var(--verde-chiaro);}
.btn{width:100%;background:var(--verde);border:none;border-radius:8px;color:#fff;font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;padding:.9rem;cursor:pointer;transition:background .2s;margin-top:1.5rem;}
.btn:hover{background:var(--verde-chiaro);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.msg{font-size:.82rem;text-align:center;margin-top:1rem;min-height:1.2rem;}
.msg.err{color:#e74c3c;}
.msg.ok{color:#2ecc71;}
.welcome{display:none;text-align:center;}
.welcome-icon{font-size:3rem;margin-bottom:1rem;}
.welcome-name{font-family:"Playfair Display",serif;font-size:1.4rem;font-weight:900;margin-bottom:.5rem;}
.welcome-sub{font-size:.85rem;opacity:.6;margin-bottom:1.5rem;}
.go-btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--verde);border-radius:10px;color:#fff;font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;padding:.85rem 2rem;text-decoration:none;transition:background .2s;}
.go-btn:hover{background:var(--verde-chiaro);}
</style>
</head>

<div class="wrap">
  <div class="card">

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="card-icon">🌿</div>
      <div class="card-title">Area Volontari</div>
      <div class="card-sub">Accedi con le tue credenziali MadrEtna</div>
      <label>Email</label>
      <input type="email" id="email" placeholder="la-tua@email.it" autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn" id="login-btn">Accedi</button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- WELCOME dopo login -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🌋</div>
      <div class="welcome-name" id="welcome-name"></div>
      <div class="welcome-sub">Accesso effettuato con successo</div>
      <a href="/madretna-app/index.html" class="go-btn">🗺 Vai all'app</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {

  var SB_URL = "https://yonlwnggyzfshkypdsus.supabase.co";
  var SB_SVC = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlvbmx3bmdneXpmc2hreXBkc3VzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDM0NDczMCwiZXhwIjoyMDg5OTIwNzMwfQ.gK9IFcG1StJmOKAlV55K4DBpi25m3kkeUhX7dm4ZNXU";
  var sb     = supabase.createClient(SB_URL, SB_SVC);

  async function hashPwd(pwd) {
    var enc = new TextEncoder().encode(pwd);
    var buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
  }

  async function getIP() {
    try {
      var r = await fetch("https://api.ipify.org?format=json");
      var d = await r.json();
      return d.ip;
    } catch(e) { return "—"; }
  }

  document.getElementById("login-btn").addEventListener("click", async function() {
    var email = document.getElementById("email").value.trim().toLowerCase();
    var pwd   = document.getElementById("password").value;
    var msg   = document.getElementById("msg");
    var btn   = this;

    if (!email||!pwd) { msg.className="msg err"; msg.textContent="Compila email e password"; return; }

    btn.disabled = true; btn.textContent = "⏳ Accesso…";
    msg.className="msg"; msg.textContent="";

    var hash = await hashPwd(pwd);
    var ip   = await getIP();
    var ua   = navigator.userAgent;

    // Cerca volontario per email
    var res = await sb.from("volontari").select("*").eq("email", email).single();

    var esito = "FALLITO";
    var nomeCompleto = email;

    if (res.data) {
      if (!res.data.attivo) {
        esito = "ACCOUNT DISATTIVATO";
      } else if (res.data.password_hash === hash) {
        esito = "OK";
        nomeCompleto = res.data.nome + " " + res.data.cognome;
      } else {
        esito = "PASSWORD ERRATA";
      }
    } else {
      esito = "EMAIL NON TROVATA";
    }

    // Salva log
    await sb.from("access_log").insert([{
      volontario_id: res.data ? res.data.id : null,
      nome_completo: nomeCompleto,
      email: email,
      ip: ip,
      user_agent: ua,
      esito: esito
    }]);

    btn.disabled = false; btn.textContent = "Accedi";

    if (esito === "OK") {
      document.getElementById("login-form").style.display = "none";
      document.getElementById("welcome").style.display = "block";
      document.getElementById("welcome-name").textContent = "Ciao, " + res.data.nome + "! 👋";
    } else if (esito === "ACCOUNT DISATTIVATO") {
      msg.className="msg err"; msg.textContent="⚠️ Il tuo account è stato disattivato. Contatta l'amministratore.";
    } else {
      msg.className="msg err"; msg.textContent="❌ Email o password non corretti";
    }
  });

  document.getElementById("password").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("login-btn").click();
  });

});
</script>
</body>
