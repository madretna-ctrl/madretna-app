<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MadrEtna — Accesso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{--verde:#2d5a27;--verde-chiaro:#4a8c3f;--lava:#1a1a1a;--sabbia:#f4ede0;--accent:#8bc34a;--rosso:#c0392b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--lava);color:var(--sabbia);min-height:100vh;display:flex;flex-direction:column;}
header{background:#fff;border-bottom:3px solid var(--verde);padding:0 1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;height:72px;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#1e1e1e;border:1px solid #333;border-radius:16px;padding:2.5rem;width:100%;max-width:420px;}
.card-icon{font-size:2.5rem;text-align:center;margin-bottom:.75rem;}
.card-title{font-family:"Playfair Display",serif;font-size:1.6rem;font-weight:900;text-align:center;margin-bottom:.3rem;}
.card-sub{font-size:.85rem;opacity:.5;text-align:center;margin-bottom:2rem;}
label{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.4rem;margin-top:.9rem;}
label:first-of-type{margin-top:0;}
input{width:100%;background:#2a2a2a;border:1px solid #444;border-radius:8px;color:var(--sabbia);font-family:"DM Sans",sans-serif;font-size:.95rem;padding:.75rem 1rem;transition:border-color .2s;}
input:focus{outline:none;border-color:var(--verde-chiaro);}
.btn{width:100%;background:var(--verde);border:none;border-radius:8px;color:#fff;font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;padding:.9rem;cursor:pointer;transition:background .2s;margin-top:1.5rem;}
.btn:hover{background:var(--verde-chiaro);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-outline{background:transparent;border:1px solid #444;color:var(--sabbia);font-family:"DM Sans",sans-serif;font-size:.9rem;font-weight:400;margin-top:.75rem;}
.btn-outline:hover{border-color:var(--verde-chiaro);background:#1a2a1a;}
.msg{font-size:.82rem;text-align:center;margin-top:1rem;min-height:1.2rem;line-height:1.5;}
.msg.err{color:#e74c3c;}
.msg.ok{color:#2ecc71;}
.divider{text-align:center;font-size:.75rem;opacity:.35;margin:.75rem 0;}
.welcome{display:none;text-align:center;}
.welcome-icon{font-size:3rem;margin-bottom:1rem;}
.welcome-name{font-family:"Playfair Display",serif;font-size:1.4rem;font-weight:900;margin-bottom:.5rem;}
.welcome-sub{font-size:.85rem;opacity:.6;margin-bottom:1.5rem;}
.go-btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--verde);border-radius:10px;color:#fff;font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;padding:.85rem 2rem;text-decoration:none;transition:background .2s;}
.go-btn:hover{background:var(--verde-chiaro);}
</style>
</head>

<body>
<header>
  <div class="header-inner">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKYAAAA0CAYAAAAAJkM/..." alt="MadrEtna" style="height:48px;width:auto;">
  </div>
</header>

<div class="wrap">
  <div class="card">

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="card-icon">🌿</div>
      <div class="card-title">Accesso MadrEtna</div>
      <div class="card-sub">Inserisci le tue credenziali</div>

      <label>Email / Username admin</label>
      <input type="email" id="email" placeholder="la-tua@email.it">

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">

      <button class="btn" id="login-btn">Accedi</button>

      <div class="divider">oppure</div>
      <button class="btn btn-outline" id="forgot-btn">🔑 Password dimenticata?</button>

      <div class="msg" id="msg"></div>
    </div>

    <!-- FORGOT FORM -->
    <div id="forgot-form" style="display:none">
      <div class="card-icon">🔑</div>
      <div class="card-title">Reimposta password</div>
      <div class="card-sub">Inserisci la tua email e ti invieremo un link</div>

      <label>Email</label>
      <input type="email" id="reset-email">

      <button class="btn" id="reset-btn">📨 Invia link di reset</button>
      <button class="btn btn-outline" id="back-btn">← Torna al login</button>

      <div class="msg" id="reset-msg"></div>
    </div>

    <!-- WELCOME -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🌋</div>
      <div class="welcome-name" id="welcome-name"></div>
      <div class="welcome-sub">Accesso effettuato con successo</div>
      <a href="/madretna-app/admin.html" class="go-btn" id="go-btn">🗺 Vai al pannello</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const ADMIN_PASSWORD = "parcoetna00";
  const SB_URL = "https://yonlwnggyzfshkypdsus.supabase.co";
  const SB_ANON = "sb_publishable_7Euxhk2THGCC35P-_V4nJQ_Ey5mz1oL";
  const SB_SVC  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";

  const sbAnon = supabase.createClient(SB_URL, SB_ANON);
  const sbSvc  = supabase.createClient(SB_URL, SB_SVC);

  // TOGGLE FORGOT
  document.getElementById("forgot-btn").addEventListener("click", function () {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("forgot-form").style.display = "block";
  });

  document.getElementById("back-btn").addEventListener("click", function () {
    document.getElementById("forgot-form").style.display = "none";
    document.getElementById("login-form").style.display = "block";
    document.getElementById("reset-msg").className = "msg";
    document.getElementById("reset-msg").textContent = "";
  });

  // RESET PASSWORD
  document.getElementById("reset-btn").addEventListener("click", async function () {
    const email = document.getElementById("reset-email").value.trim().toLowerCase();
    const msg   = document.getElementById("reset-msg");
    const btn   = this;

    if (!email) {
      msg.className = "msg err";
      msg.textContent = "Inserisci la tua email.";
      return;
    }

    btn.disabled = true;
    btn.textContent = "⏳ Invio…";
    msg.className = "msg";
    msg.textContent = "";

    const check = await sbSvc.from("volontari").select("id,attivo").eq("email", email).single();

    if (!check.data) {
      msg.className = "msg err";
      msg.textContent = "Email non trovata nel sistema.";
      btn.disabled = false;
      btn.textContent = "📨 Invia link di reset";
      return;
    }

    if (!check.data.attivo) {
      msg.className = "msg err";
      msg.textContent = "Account disattivato. Contatta l'amministratore.";
      btn.disabled = false;
      btn.textContent = "📨 Invia link di reset";
      return;
    }

    const res = await sbAnon.auth.resetPasswordForEmail(email, {
      redirectTo: "https://madretna-ctrl.github.io/madretna-app/change-password.html"
    });

    btn.disabled = false;
    btn.textContent = "📨 Invia link di reset";

    if (res.error) {
      msg.className = "msg err";
      msg.textContent = "Errore: " + res.error.message;
    } else {
      msg.className = "msg ok";
      msg.textContent = "✅ Email inviata! Controlla " + email;
    }
  });

  // LOGIN
  document.getElementById("login-btn").addEventListener("click", async function () {
    const email = document.getElementById("email").value.trim().toLowerCase();
    const pwd   = document.getElementById("password").value;
    const msg   = document.getElementById("msg");
    const btn   = this;

    if (!email || !pwd) {
      msg.className = "msg err";
      msg.textContent = "Compila tutti i campi";
      return;
    }

    btn.disabled = true;
    btn.textContent = "⏳ Accesso…";
    msg.className = "msg";
    msg.textContent = "";

    // ADMIN
    if (pwd === ADMIN_PASSWORD && (email === "admin" || email === "admin@madretna.it" || email === "madretna@gmail.com")) {
      btn.disabled = false;
      btn.textContent = "Accedi";
      document.getElementById("login-form").style.display = "none";
      document.getElementById("welcome").style.display = "block";
      document.getElementById("welcome-name").textContent = "Ciao, Admin! 👋";
      document.getElementById("go-btn").href = "/madretna-app/admin.html?ruolo=admin";
      return;
    }

    // VOLONTARIO
    const authRes = await sbAnon.auth.signInWithPassword({ email: email, password: pwd });

    if (authRes.error) {
      await legacyLogin(email, pwd, msg, btn);
      return;
    }

    const profile = await sbSvc.from("volontari").select("*").eq("email", email).single();

    btn.disabled = false;
    btn.textContent = "Accedi";

    if (!profile.data || !profile.data.attivo) {
      await sbAnon.auth.signOut();
      msg.className = "msg err";
      msg.textContent = "Account disattivato.";
      return;
    }

    await logAccesso(profile.data, "OK");

    document.getElementById("login-form").style.display = "none";
    document.getElementById("welcome").style.display = "block";
    document.getElementById("welcome-name").textContent = "Ciao, " + profile.data.nome + "! 👋";

    document.getElementById("go-btn").href =
      "/madretna-app/admin.html?ruolo=volontario&nome=" +
      encodeURIComponent(profile.data.nome + " " + profile.data.cognome) +
      "&comune=" +
      encodeURIComponent(profile.data.comune_riferimento || "");
  });

  document.getElementById("password").addEventListener("keydown", function (e) {
    if (e.key === "Enter") document.getElementById("login-btn").click();
  });

  // LEGACY LOGIN
  async function legacyLogin(email, pwd, msg, btn) {
    const enc = new TextEncoder().encode(pwd);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");

    let ip = "—";
    try {
      const r = await fetch("https://api.ipify.org?format=json");
      const d = await r.json();
      ip = d.ip;
    } catch (e) {}

    const res = await sbSvc.from("volontari").select("*").eq("email", email).single();

    btn.disabled = false;
    btn.textContent = "Accedi";

    if (!res.data) {
      msg.className = "msg err";
      msg.textContent = "❌ Email o password non corretti";
      return;
    }

    if (!res.data.attivo) {
      msg.className = "msg err";
      msg.textContent = "⚠️ Account disattivato.";
      return;
    }

    if (res.data.password_hash !== hash) {
      await logAccesso(res.data, "PASSWORD ERRATA");
      msg.className = "msg err";
      msg.textContent = "❌ Email o password non corretti";
      return;
    }

    await logAccesso(res.data, "OK (legacy)");

    document.getElementById("login-form").style.display = "none";
    document.getElementById("welcome").style.display = "block";
    document.getElementById("welcome-name").textContent = "Ciao, " + res.data.nome + "! 👋";

    document.getElementById("go-btn").href =
      "/madretna-app/admin.html?ruolo=volontario&nome=" +
      encodeURIComponent(res.data.nome + " " + res.data.cognome) +
      "&comune=" +
      encodeURIComponent(res.data.comune_riferimento || "");
  }

  // LOG ACCESSO
  async function logAccesso(volontario, esito) {
    let ip = "—";
    try {
      const r = await fetch("https://api.ipify.org?format=json");
      const d = await r.json();
      ip = d.ip;
    } catch (e) {}

    await sbSvc.from("access_log").insert([{
      volontario_id: volontario.id,
      nome_completo: volontario.nome + " " + volontario.cognome,
      email: volontario.email,
      ip: ip,
      user_agent: navigator.userAgent,
      esito: esito
    }]);
  }

});
</script>

</body>
</html>
